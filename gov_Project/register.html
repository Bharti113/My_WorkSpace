<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | IntelliScheme Portal</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0d6efd, #4e73df);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .register-card {
        width: 100%;
        max-width: 420px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        padding: 30px;
        background: #ffffff;
        animation: fadeIn 0.8s ease-in-out;
    }

    .register-card h2 {
        font-weight: 600;
        margin-bottom: 10px;
        text-align: center;
    }

    .register-card p {
        text-align: center;
        color: #6c757d;
        margin-bottom: 25px;
    }

    .btn-custom {
        background-color: #0d6efd;
        border: none;
        transition: 0.3s;
    }

    .btn-custom:hover {
        background-color: #0b5ed7;
        transform: translateY(-2px);
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #0d6efd;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .password-toggle {
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="register-card">
    <h2>Create Account</h2>
    <p>Join IntelliScheme Portal</p>

    <form id="registerForm">

        <!-- Full Name -->
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your full name" required>
        </div>

        <!-- Email or Mobile -->
        <div class="mb-3">
            <label class="form-label">Email or Mobile Number</label>
            <input type="text" class="form-control" placeholder="Enter email or mobile number" required>
        </div>

        <!-- Password -->
        <div class="mb-3 position-relative">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            <small id="passwordError" class="text-danger d-none">Passwords do not match</small>
        </div>

        <!-- Register Button -->
        <div class="d-grid">
            <button type="submit" class="btn btn-custom btn-lg">Register</button>
        </div>

        <div class="text-center mt-3">
            Already have an account? <a href="login.html">Login</a>
        </div>

    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.getElementById("registerForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const error = document.getElementById("passwordError");

    form.addEventListener("submit", function(e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            error.classList.remove("d-none");
        } else {
            error.classList.add("d-none");
            alert("Account created successfully!");
        }
    });
</script>

</body>
</html>
